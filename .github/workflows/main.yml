          "https://files2.coccoc.com/apps/browser/win/x64/140.0.7339.240/140.0.7339.240_coccocsetup.exe",
          "https://files2.coccoc.com/apps/browser/win/x64/140.0.7339.242/140.0.7339.242_coccocsetup.exe",
          "https://files2.coccoc.com/apps/browser/win/x64/140.0.7339.244/140.0.7339.244_coccocsetup.exe",
          "https://files2.coccoc.com/apps/browser/win/x64/140.0.7339.250/140.0.7339.250_coccocsetup.exe",
          "https://files2.coccoc.com/apps/browser/win/x64/141.0.7390.126/141.0.7390.126_coccocsetup.exe",
