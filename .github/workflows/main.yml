          "https://files2.coccoc.com/apps/browser/win/x64/146.0.7680.188/146.0.7680.188_coccocsetup.exe",
          "https://files2.coccoc.com/apps/browser/win/x64/146.0.7680.190/146.0.7680.190_coccocsetup.exe",
          "https://files2.coccoc.com/apps/browser/win/x64/147.0.7727.142/147.0.7727.142_coccocsetup.exe",
          "https://files2.coccoc.com/apps/browser/win/x64/147.0.7727.150/147.0.7727.150_coccocsetup.exe",
          "https://files2.coccoc.com/apps/browser/win/x64/148.0.7778.260/148.0.7778.260_coccocsetup.exe",
          "https://files2.coccoc.com/apps/browser/win/x64/149.0.7827.206/149.0.7827.206_coccocsetup.exe"
        ]
      fail-fast: false

    steps:
      - name: Extract Version
        id: extract
        shell: bash
        run: |
          URL="${{ matrix.url }}"
          VERSION=$(echo $URL | grep -oP '(?<=x64/)[^/]+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "filename=$(basename $URL)" >> $GITHUB_OUTPUT

      - name: Download File
        run: curl -L -O ${{ matrix.url }}

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.extract.outputs.version }}"
          FILENAME="${{ steps.extract.outputs.filename }}"
          
          if gh release view "v$VERSION" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "Release v$VERSION exists."
          else
            gh release create "v$VERSION" \
              --title "$VERSION" \
              --notes "$VERSION" \
              --repo ${{ github.repository }} \
              "$FILENAME"
          fi
