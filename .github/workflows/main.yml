          "https://files2.coccoc.com/apps/browser/win/x64/142.0.7444.182/142.0.7444.182_coccocsetup.exe",
          "https://files2.coccoc.com/apps/browser/win/x64/142.0.7444.184/142.0.7444.184_coccocsetup.exe",
